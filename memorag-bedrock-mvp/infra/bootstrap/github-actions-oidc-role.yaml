AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC role for deploying the MemoRAG Bedrock MVP with AWS CDK.

Parameters:
  GitHubOwner:
    Type: String
    Description: GitHub organization or user that owns the deployment repository.
    AllowedPattern: "^[A-Za-z0-9-]+$"

  GitHubRepository:
    Type: String
    Description: GitHub repository name that runs the deployment workflow.
    AllowedPattern: "^[A-Za-z0-9_.-]+$"

  GitHubEnvironment:
    Type: String
    Default: dev
    Description: GitHub Environment name used by the deployment workflow.
    AllowedPattern: "^[A-Za-z0-9_.:/@-]+$"

  DeployRoleName:
    Type: String
    Default: memorag-github-actions-deploy
    Description: IAM role name assumed by GitHub Actions.
    AllowedPattern: "^[A-Za-z0-9+=,.@_-]{1,64}$"

  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Optional existing GitHub OIDC provider ARN. Leave empty to create one in this stack.

  ManagedPolicyArns:
    Type: CommaDelimitedList
    Description: Comma-separated IAM managed policy ARNs attached to the deploy role. Specify least-privileged policies required for your deployment.

  AllowedWorkflowRef:
    Type: String
    Default: tsuji-tomonori/rag-assist/.github/workflows/memorag-deploy.yml@refs/heads/main
    Description: GitHub workflow_ref claim allowed to assume this role.
    AllowedPattern: "^[A-Za-z0-9_.:/@-]+$"

Conditions:
  CreateGitHubOidcProvider:
    Fn::Equals:
      - Ref: ExistingGitHubOidcProviderArn
      - ""

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Name
          Value: github-actions-oidc
        - Key: Project
          Value: memorag-bedrock-mvp
        - Key: Application
          Value: MemoRAG
        - Key: Environment
          Value:
            Ref: GitHubEnvironment
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: tsuji-tomonori/rag-assist
        - Key: CostCenter
          Value: memorag-mvp

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Ref: DeployRoleName
      Description:
        Fn::Sub: GitHub Actions deployment role for ${GitHubOwner}/${GitHubRepository} ${GitHubEnvironment}.
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        Ref: ManagedPolicyArns
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated:
                Fn::If:
                  - CreateGitHubOidcProvider
                  - Ref: GitHubOidcProvider
                  - Ref: ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:workflow_ref:
                  Ref: AllowedWorkflowRef
              StringLike:
                token.actions.githubusercontent.com:sub:
                  Fn::Sub: repo:${GitHubOwner}/${GitHubRepository}:environment:${GitHubEnvironment}
      Tags:
        - Key: Name
          Value:
            Ref: DeployRoleName
        - Key: Project
          Value: memorag-bedrock-mvp
        - Key: Application
          Value: MemoRAG
        - Key: Environment
          Value:
            Ref: GitHubEnvironment
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: tsuji-tomonori/rag-assist
        - Key: CostCenter
          Value: memorag-mvp

Outputs:
  GitHubOidcProviderArn:
    Description: GitHub OIDC provider ARN used by the deploy role.
    Value:
      Fn::If:
        - CreateGitHubOidcProvider
        - Ref: GitHubOidcProvider
        - Ref: ExistingGitHubOidcProviderArn

  GitHubActionsDeployRoleArn:
    Description: Set this value as the GitHub secret AWS_DEPLOY_ROLE_ARN.
    Value:
      Fn::GetAtt:
        - GitHubActionsDeployRole
        - Arn

  GitHubActionsSubject:
    Description: GitHub OIDC subject claim allowed to assume the role.
    Value:
      Fn::Sub: repo:${GitHubOwner}/${GitHubRepository}:environment:${GitHubEnvironment}
