name: Validate Semver Label

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  validate-semver-label:
    runs-on: ubuntu-latest
    steps:
      - name: semverラベルの確認
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const semverLabels = ['semver:major', 'semver:minor', 'semver:patch'];
            const hits = semverLabels.filter(name => labels.includes(name));

            if (hits.length !== 1) {
              core.setFailed(`PRには semver:major / semver:minor / semver:patch のいずれか1つを付与してください。現在: ${hits.join(', ') || 'なし'}`);
            } else {
              core.info(`semver label OK: ${hits[0]}`);
            }
