name: MemoRAG CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run-rag-promotion-gate:
        description: Evaluate an explicit candidate policy and observations artifact after ordinary CI checks.
        required: true
        type: boolean
        default: false
      rag-quality-policy-path:
        description: Repository-relative path to the versioned approved RAG quality policy JSON.
        required: false
        type: string
        default: ""
      rag-quality-observations-path:
        description: Repository-relative path to the versioned candidate observations JSON.
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: memorag-ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, type-check, test, build, and synth
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        id: install
        run: npm ci
        continue-on-error: true

      - name: Lint web
        id: web_lint
        run: npm exec -- eslint apps/web --cache --cache-location .eslintcache-web --max-warnings=0
        continue-on-error: true

      - name: Lint api
        id: api_lint
        run: npm exec -- eslint apps/api --cache --cache-location .eslintcache-api --max-warnings=0
        continue-on-error: true

      - name: Lint infra
        id: infra_lint
        run: npm exec -- eslint infra --cache --cache-location .eslintcache-infra --max-warnings=0
        continue-on-error: true

      - name: Type-check infra
        id: infra_typecheck
        run: npm run typecheck -w @memorag-mvp/infra
        continue-on-error: true

      - name: Type-check api
        id: api_typecheck
        run: npm run typecheck -w @memorag-mvp/api
        continue-on-error: true

      - name: Check OpenAPI contract docs
        id: openapi_docs
        run: npm run docs:openapi:check
        continue-on-error: true

      - name: Check source-backed API docs
        id: api_code_docs
        run: npm run docs:api-code:check
        continue-on-error: true

      - name: Check canonical docs structure
        id: docs_structure
        run: |
          python3 scripts/validate_docs.py
          npm run docs:hidden-unicode:check
        continue-on-error: true

      - name: Type-check web
        id: web_typecheck
        run: npm run typecheck -w @memorag-mvp/web
        continue-on-error: true

      - name: Test UI semantic trace validator
        id: web_trace_test
        run: npm run docs:web-trace:test
        continue-on-error: true

      - name: Test semantic UI contract
        id: web_semantic_ui
        run: npm run test:web-semantic-ui
        continue-on-error: true

      - name: Check generated web inventory
        id: web_inventory
        run: npm run docs:web-inventory:check
        continue-on-error: true

      - name: Check generated infra inventory
        id: infra_inventory
        run: npm run docs:infra-inventory:check
        continue-on-error: true

      - name: Type-check benchmark
        id: benchmark_typecheck
        run: npm run typecheck -w @memorag-mvp/benchmark
        continue-on-error: true

      - name: Audit product runtime for benchmark-specific branches
        id: rag_release_source_audit
        run: npm run rag:release:source-audit
        continue-on-error: true

      - name: Test infra
        id: infra_test
        run: npm test -w @memorag-mvp/infra
        continue-on-error: true

      - name: Test benchmark
        id: benchmark_test
        run: npm test -w @memorag-mvp/benchmark
        continue-on-error: true

      - name: Test api with coverage
        id: api_test
        run: |
          # The package script owns one quoted recursive glob so shell/npm cwd
          # differences cannot omit or duplicate API test files.
          set +e
          npm run test:coverage -w @memorag-mvp/api
          api_test_status=$?
          set -e
          node -e 'const fs = require("fs"); const s = require("./apps/api/coverage/coverage-summary.json").total; fs.appendFileSync(process.env.GITHUB_OUTPUT, `c0=${s.statements.pct}%\nc1=${s.branches.pct}%\n`)'
          exit "$api_test_status"
        continue-on-error: true

      - name: Test web with coverage
        id: web_test
        run: |
          npm run test:coverage -w @memorag-mvp/web
          node -e 'const fs = require("fs"); const s = require("./apps/web/coverage/coverage-summary.json").total; fs.appendFileSync(process.env.GITHUB_OUTPUT, `c0=${s.statements.pct}%\nc1=${s.branches.pct}%\n`)'
        continue-on-error: true

      - name: Build infra
        id: infra_build
        run: npm run build -w @memorag-mvp/infra
        continue-on-error: true

      - name: Build api
        id: api_build
        run: npm run build -w @memorag-mvp/api
        continue-on-error: true

      - name: Build web
        id: web_build
        run: npm run build -w @memorag-mvp/web
        continue-on-error: true

      - name: Build benchmark
        id: benchmark_build
        run: npm run build -w @memorag-mvp/benchmark
        continue-on-error: true

      - name: Synthesize CDK template with cdk-nag
        id: cdk_synth
        run: |
          mkdir -p infra/cdk.out
          npm run cdk -w @memorag-mvp/infra -- synth > infra/cdk.out/MemoRagMvpStack.template.yaml
        continue-on-error: true

      - name: Check DynamoDB GSI update limit
        id: dynamodb_gsi_guard
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "DynamoDB GSI update limit guard skipped outside pull_request events."
            exit 0
          fi
          git fetch --depth=1 origin "${{ github.base_ref }}"
          git show FETCH_HEAD:infra/test/__snapshots__/memorag-mvp-stack.snapshot.json > /tmp/memorag-base-template.json
          npm run check:dynamodb-gsi-update-limit -w @memorag-mvp/infra -- /tmp/memorag-base-template.json test/__snapshots__/memorag-mvp-stack.snapshot.json
        continue-on-error: true

      - name: Upload CDK synth artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: memorag-ci-cdk-synth
          path: |
            infra/cdk.out/MemoRagMvpStack.template.yaml
            infra/cdk.out/AwsSolutions-*-NagReport.csv
          if-no-files-found: warn

      - name: Comment CI result on PR
        # 検証観点:
        # - 同一リポジトリPR: コメント投稿成功
        # - fork PR/制限コンテキスト: このステップをスキップ
        # - 投稿失敗時: continue-on-error により workflow 全体を failure にしない
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const marker = '<!-- memorag-ci-result -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { owner, repo } = context.repo;
            let synthArtifactLink = `${runUrl}#artifacts`;
            try {
              const { data: artifactResult } = await github.rest.actions.listWorkflowRunArtifacts({
                owner,
                repo,
                run_id: context.runId,
                per_page: 100,
              });
              const synthArtifact = artifactResult.artifacts.find((artifact) =>
                artifact.name === 'memorag-ci-cdk-synth'
              );
              if (synthArtifact) {
                synthArtifactLink = `${runUrl}/artifacts/${synthArtifact.id}`;
              }
            } catch (error) {
              core.warning(`Failed to find CDK synth artifact: ${error.message}`);
            }
            const coverage = (c0, c1, options = {}) => {
              if (!c0 || !c1) return 'C0 statements: unknown / C1 branches: unknown';
              const c0Value = Number.parseFloat(c0);
              const c1Value = Number.parseFloat(c1);
              const c0Status = c0Value >= 90 ? 'C0達成' : 'C0未達';
              const c1Status = c1Value >= 85
                ? 'C1達成'
                : options.c1ImprovementTask
                  ? `C1未達(改善計画: ${options.c1ImprovementTask})`
                  : 'C1未達';
              return `C0 statements: ${c0} / C1 branches: ${c1} (target: C0 >= 90% / C1 >= 85%; ${c0Status} / ${c1Status})`;
            };
            const results = [
              ['all', 'Install dependencies', '${{ steps.install.outcome }}', '-', '`npm ci`'],
              ['web', 'Lint', '${{ steps.web_lint.outcome }}', '-', '`npm exec -- eslint apps/web --cache --cache-location .eslintcache-web --max-warnings=0`'],
              ['api', 'Lint', '${{ steps.api_lint.outcome }}', '-', '`npm exec -- eslint apps/api --cache --cache-location .eslintcache-api --max-warnings=0`'],
              ['infra', 'Lint', '${{ steps.infra_lint.outcome }}', '-', '`npm exec -- eslint infra --cache --cache-location .eslintcache-infra --max-warnings=0`'],
              ['infra', 'Type-check', '${{ steps.infra_typecheck.outcome }}', '-', '`npm run typecheck -w @memorag-mvp/infra`'],
              ['api', 'Type-check', '${{ steps.api_typecheck.outcome }}', '-', '`npm run typecheck -w @memorag-mvp/api`'],
              ['api', 'OpenAPI contract docs', '${{ steps.openapi_docs.outcome }}', 'runtime source / docs freshness / lifecycle gate', '`npm run docs:openapi:check`'],
              ['api', 'Source-backed API docs', '${{ steps.api_code_docs.outcome }}', 'route coverage / six documents per API / source freshness', '`npm run docs:api-code:check`'],
              ['all', 'Canonical docs structure', '${{ steps.docs_structure.outcome }}', 'layout / trace / generated provenance / hidden Unicode', '`python3 scripts/validate_docs.py` + `npm run docs:hidden-unicode:check`'],
              ['web', 'Type-check', '${{ steps.web_typecheck.outcome }}', '-', '`npm run typecheck -w @memorag-mvp/web`'],
              ['web', 'Semantic UI trace validator test', '${{ steps.web_trace_test.outcome }}', 'missing / orphan / duplicate / invalid / stale classifications', '`npm run docs:web-trace:test`'],
              ['web', 'Semantic status contract test', '${{ steps.web_semantic_ui.outcome }}', 'display vocabulary / dialog intents / multiple cues / WCAG AA token contrast', '`npm run test:web-semantic-ui`'],
              ['web', 'Generated inventory check', '${{ steps.web_inventory.outcome }}', '-', '`npm run docs:web-inventory:check`'],
              ['infra', 'Generated inventory check', '${{ steps.infra_inventory.outcome }}', '-', '`npm run docs:infra-inventory:check`'],
              ['benchmark', 'Type-check', '${{ steps.benchmark_typecheck.outcome }}', '-', '`npm run typecheck -w @memorag-mvp/benchmark`'],
              ['benchmark', 'Product runtime release audit', '${{ steps.rag_release_source_audit.outcome }}', 'actual apps/api/src + apps/web/src scan', '`npm run rag:release:source-audit`'],
              ['infra', 'Test', '${{ steps.infra_test.outcome }}', 'C0: 未計測 / C1: 未計測', '`npm test -w @memorag-mvp/infra`'],
              ['benchmark', 'Test', '${{ steps.benchmark_test.outcome }}', 'C0: 未計測 / C1: 未計測', '`npm test -w @memorag-mvp/benchmark`'],
              ['api', 'Test', '${{ steps.api_test.outcome }}', coverage('${{ steps.api_test.outputs.c0 }}', '${{ steps.api_test.outputs.c1 }}', { c1ImprovementTask: '`tasks/todo/20260712-coverage-api-c1-recovery.md`' }), '`npm run test:coverage -w @memorag-mvp/api`'],
              ['web', 'Test', '${{ steps.web_test.outcome }}', coverage('${{ steps.web_test.outputs.c0 }}', '${{ steps.web_test.outputs.c1 }}'), '`npm exec -w @memorag-mvp/web -- vitest run --coverage ...`'],
              ['infra', 'Build', '${{ steps.infra_build.outcome }}', '-', '`npm run build -w @memorag-mvp/infra`'],
              ['api', 'Build', '${{ steps.api_build.outcome }}', '-', '`npm run build -w @memorag-mvp/api`'],
              ['web', 'Build', '${{ steps.web_build.outcome }}', '-', '`npm run build -w @memorag-mvp/web`'],
              ['benchmark', 'Build', '${{ steps.benchmark_build.outcome }}', '-', '`npm run build -w @memorag-mvp/benchmark`'],
              ['infra', 'CDK synth', '${{ steps.cdk_synth.outcome }}', 'cdk-nag enabled', '`npm run cdk -w @memorag-mvp/infra -- synth`'],
              ['infra', 'DynamoDB GSI update limit guard', '${{ steps.dynamodb_gsi_guard.outcome }}', 'existing table GSI add/delete <= 1', '`npm run check:dynamodb-gsi-update-limit -w @memorag-mvp/infra -- <base> test/__snapshots__/memorag-mvp-stack.snapshot.json`'],
            ];
            const icon = (outcome) => outcome === 'success' ? ':white_check_mark:' : ':x:';
            const overall = results.every(([, , outcome]) => outcome === 'success') ? 'success' : 'failure';
            const rows = results
              .map(([target, name, outcome, coverage, command]) =>
                `| ${target} | ${name} | ${icon(outcome)} ${outcome} | ${coverage} | ${command} |`
              )
              .join('\n');
            const body = [
              marker,
              '## MemoRAG CI Result',
              '',
              `| Target | Item | Result | Coverage (C0/C1) | Command |`,
              `|---|---|---|---|---|`,
              rows,
              '',
              `| Summary | Result | Link |`,
              `|---|---|---|`,
              `| Overall | ${icon(overall)} ${overall} | [Workflow run](${runUrl}) |`,
              `| CDK synth artifact | - | [memorag-ci-cdk-synth](${synthArtifactLink}) |`,
            ].join('\n');

            const issue_number = context.payload.pull_request?.number ?? context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }


      - name: Note when PR comment is skipped for fork
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          echo "CI result comment was skipped because this PR is from a fork and GITHUB_TOKEN has read-only permissions." >> $GITHUB_STEP_SUMMARY

      - name: Fail when CI checks failed
        if: ${{ always() && (steps.install.outcome != 'success' || steps.web_lint.outcome != 'success' || steps.api_lint.outcome != 'success' || steps.infra_lint.outcome != 'success' || steps.infra_typecheck.outcome != 'success' || steps.api_typecheck.outcome != 'success' || steps.openapi_docs.outcome != 'success' || steps.api_code_docs.outcome != 'success' || steps.docs_structure.outcome != 'success' || steps.web_typecheck.outcome != 'success' || steps.web_trace_test.outcome != 'success' || steps.web_semantic_ui.outcome != 'success' || steps.web_inventory.outcome != 'success' || steps.infra_inventory.outcome != 'success' || steps.benchmark_typecheck.outcome != 'success' || steps.rag_release_source_audit.outcome != 'success' || steps.infra_test.outcome != 'success' || steps.benchmark_test.outcome != 'success' || steps.api_test.outcome != 'success' || steps.web_test.outcome != 'success' || steps.infra_build.outcome != 'success' || steps.api_build.outcome != 'success' || steps.web_build.outcome != 'success' || steps.benchmark_build.outcome != 'success' || steps.cdk_synth.outcome != 'success' || steps.dynamodb_gsi_guard.outcome != 'success') }}
        run: exit 1

  rag-promotion-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-rag-promotion-gate }}
    needs: ci
    name: Explicit RAG candidate promotion gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Evaluate approved versioned RAG promotion evidence
        env:
          RAG_QUALITY_POLICY_PATH: ${{ inputs.rag-quality-policy-path }}
          RAG_QUALITY_OBSERVATIONS_PATH: ${{ inputs.rag-quality-observations-path }}
        run: |
          mkdir -p artifacts/rag-promotion
          npm run rag:promotion:check -- \
            --policy "$RAG_QUALITY_POLICY_PATH" \
            --observations "$RAG_QUALITY_OBSERVATIONS_PATH" \
            --output artifacts/rag-promotion/decision.json

      - name: Upload RAG promotion decision
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: memorag-rag-promotion-${{ github.run_id }}
          path: artifacts/rag-promotion/decision.json
          if-no-files-found: error
