name: MemoRAG CI

on:
  pull_request:
    paths:
      - ".github/workflows/memorag-ci.yml"
      - "memorag-bedrock-mvp/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/memorag-ci.yml"
      - "memorag-bedrock-mvp/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: memorag-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: memorag-bedrock-mvp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: memorag-bedrock-mvp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci
