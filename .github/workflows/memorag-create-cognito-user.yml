name: Create MemoRAG Cognito User

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment name used for AWS OIDC and approvals.
        required: true
        default: dev
      aws-region:
        description: AWS region where the MemoRAG stack is deployed.
        required: true
        default: us-east-1
      stack-name:
        description: CloudFormation stack name that outputs CognitoUserPoolId.
        required: true
        default: MemoRagMvpStack
      user-pool-id:
        description: Optional Cognito User Pool ID. Leave empty to resolve from stack output.
        required: false
        default: ""
      email:
        description: Email address for the Cognito user. Also used as username.
        required: true
      display-name:
        description: Optional display name stored in the Cognito name attribute.
        required: false
        default: ""
      roles:
        description: Comma-separated Cognito groups to assign.
        required: true
        default: CHAT_USER

permissions:
  contents: read
  id-token: write

concurrency:
  group: memorag-create-cognito-user-${{ inputs.environment || 'dev' }}-${{ inputs.email }}
  cancel-in-progress: false

jobs:
  create-user:
    name: Create Cognito user
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: memorag-bedrock-mvp
    env:
      AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      STACK_NAME: ${{ inputs.stack-name || 'MemoRagMvpStack' }}
      USER_POOL_ID: ${{ inputs.user-pool-id }}
      USER_EMAIL: ${{ inputs.email }}
      USER_DISPLAY_NAME: ${{ inputs.display-name }}
      USER_ROLES: ${{ inputs.roles || 'CHAT_USER' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Cognito user
        run: |
          set -euo pipefail

          args=(
            --email "$USER_EMAIL"
            --stack-name "$STACK_NAME"
            --region "$AWS_REGION"
          )

          if [[ -n "$USER_POOL_ID" ]]; then
            args+=(--user-pool-id "$USER_POOL_ID")
          fi

          if [[ -n "$USER_DISPLAY_NAME" ]]; then
            args+=(--name "$USER_DISPLAY_NAME")
          fi

          assigned_roles=()
          allowed_roles=(
            CHAT_USER
            ANSWER_EDITOR
            RAG_GROUP_MANAGER
            USER_ADMIN
            ACCESS_ADMIN
            COST_AUDITOR
          )
          IFS=',' read -ra requested_roles <<< "$USER_ROLES"
          for role in "${requested_roles[@]}"; do
            role="${role#"${role%%[![:space:]]*}"}"
            role="${role%"${role##*[![:space:]]}"}"
            if [[ -n "$role" ]]; then
              if [[ ! " ${allowed_roles[*]} " =~ [[:space:]]${role}[[:space:]] ]]; then
                echo "Unsupported role in this workflow: $role" >&2
                echo "Allowed roles: ${allowed_roles[*]}" >&2
                echo "SYSTEM_ADMIN must not be assigned from GitHub Actions." >&2
                exit 1
              fi
              args+=(--role "$role")
              assigned_roles+=("$role")
            fi
          done

          if [[ ${#assigned_roles[@]} -eq 0 ]]; then
            echo "No Cognito role was provided." >&2
            exit 1
          fi

          infra/scripts/create-cognito-user.sh "${args[@]}"

          {
            echo "## Cognito user creation"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Email | \`$USER_EMAIL\` |"
            echo "| Stack | \`$STACK_NAME\` |"
            echo "| Region | \`$AWS_REGION\` |"
            echo "| Roles | \`${assigned_roles[*]}\` |"
            echo ""
            echo "Cognito invitation email is sent by default for newly created users."
          } >> "$GITHUB_STEP_SUMMARY"
