name: Generate MemoRAG API Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/memorag-openapi-docs.yml"
      - "apps/api/**"
      - "packages/contract/**"
      - "package.json"
      - "package-lock.json"
      - "Taskfile.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: memorag-openapi-docs-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate API Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI docs
        run: npm run docs:openapi

      - name: Check OpenAPI contract docs
        run: npm run docs:openapi:check

      - name: Generate source-backed API docs
        run: npm run docs:api-code

      - name: Check source-backed API docs
        run: npm run docs:api-code:check

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.OPENAPI_DOCS_PR_TOKEN || github.token }}
          branch: chore/memorag-openapi-docs
          delete-branch: true
          commit-message: "📝 docs(api): API 生成ドキュメントを更新"
          title: "📝 docs(api): API 生成ドキュメントを更新"
          body: |
            Hono の OpenAPI 定義から contract Markdown を再生成し、TypeScript 実装から API ごとの詳細設計、IF、メッセージ、query、sequence、unit test 仕様を再生成しました。

            ### 生成コマンド

            - `npm run docs:openapi`
            - `npm run docs:api-code`
          add-paths: |
            docs/generated/openapi.md
            docs/generated/openapi
            docs/generated/api-code
