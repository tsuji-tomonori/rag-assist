name: Watch merged cost-first deploy once

on:
  push:
    branches:
      - codex/cost-first-deploy-without-rag-s3-scan

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: bfaf8f20d86058ef6ef7e89aa5c368004aa9bba7
      TARGET_PR: "447"
    steps:
      - name: Locate and watch Deploy MemoRAG MVP
        shell: bash
        run: |
          set -euo pipefail

          run_id=""
          run_url=""
          for attempt in $(seq 1 80); do
            runs_json="$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$TARGET_SHA&event=push&per_page=100")"
            run_id="$(jq -r '.workflow_runs[] | select(.name == "Deploy MemoRAG MVP") | .id' <<<"$runs_json" | head -n1)"
            run_url="$(jq -r '.workflow_runs[] | select(.name == "Deploy MemoRAG MVP") | .html_url' <<<"$runs_json" | head -n1)"
            if [[ -n "$run_id" && "$run_id" != "null" ]]; then
              break
            fi
            sleep 15
          done

          status="not_found"
          conclusion="not_found"
          deploy_job_conclusion="not_found"
          cdk_step_conclusion="not_found"
          outputs_step_conclusion="not_found"
          artifact_names="none"

          if [[ -n "$run_id" && "$run_id" != "null" ]]; then
            for attempt in $(seq 1 200); do
              run_json="$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id")"
              status="$(jq -r '.status' <<<"$run_json")"
              conclusion="$(jq -r '.conclusion // ""' <<<"$run_json")"
              if [[ "$status" == "completed" ]]; then
                break
              fi
              sleep 15
            done

            jobs_json="$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100")"
            artifacts_json="$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts?per_page=100")"
            deploy_job_conclusion="$(jq -r '[.jobs[] | select(.name == "CDK deploy")][0].conclusion // "not_found"' <<<"$jobs_json")"
            cdk_step_conclusion="$(jq -r '[.jobs[] | select(.name == "CDK deploy")][0].steps[]? | select(.name == "CDK deploy") | .conclusion' <<<"$jobs_json" | head -n1)"
            outputs_step_conclusion="$(jq -r '[.jobs[] | select(.name == "CDK deploy")][0].steps[]? | select(.name == "Upload deployment outputs") | .conclusion' <<<"$jobs_json" | head -n1)"
            artifact_names="$(jq -r '[.artifacts[].name] | if length == 0 then "none" else join(", ") end' <<<"$artifacts_json")"
          fi

          result_file="$(mktemp)"
          cat >"$result_file" <<EOF
          <!-- codex-deploy-watch-start -->
          ## Automated deploy verification

          - merge commit: \`$TARGET_SHA\`
          - workflow run: ${run_url:-not found}
          - run id: \`${run_id:-not_found}\`
          - workflow status: \`$status\`
          - workflow conclusion: \`${conclusion:-unknown}\`
          - CDK deploy job: \`$deploy_job_conclusion\`
          - \`CDK deploy\` step: \`${cdk_step_conclusion:-not_found}\`
          - \`Upload deployment outputs\` step: \`${outputs_step_conclusion:-not_found}\`
          - artifacts: \`$artifact_names\`
          <!-- codex-deploy-watch-end -->
          EOF

          current_body="$(gh api "/repos/$GITHUB_REPOSITORY/pulls/$TARGET_PR" --jq '.body // ""')"
          CURRENT_BODY="$current_body" RESULT_FILE="$result_file" python3 - <<'PY' > /tmp/new-pr-body.md
          import os
          import re
          from pathlib import Path

          body = os.environ["CURRENT_BODY"]
          body = re.sub(
              r"\n*<!-- codex-deploy-watch-start -->.*?<!-- codex-deploy-watch-end -->\n*",
              "\n",
              body,
              flags=re.S,
          ).rstrip()
          result = Path(os.environ["RESULT_FILE"]).read_text().strip()
          print(f"{body}\n\n{result}\n")
          PY

          gh api --method PATCH "/repos/$GITHUB_REPOSITORY/pulls/$TARGET_PR" -f body="$(cat /tmp/new-pr-body.md)"
