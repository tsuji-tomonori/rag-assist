name: Apply cost-first EventBridge stop once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'codex/cost-first-disable-background-s3-scans' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          if ! npm ci > /tmp/npm-ci.log 2>&1; then
            tail -n 120 /tmp/npm-ci.log
            exit 1
          fi
          echo "npm ci completed"

      - name: Apply EventBridge and runtime stop
        run: python3 scripts/apply-cost-first-eventbridge-stop.py

      - name: Update infra snapshot
        env:
          UPDATE_SNAPSHOTS: "1"
        run: |
          if ! npm test -w @memorag-mvp/infra > /tmp/infra-test.log 2>&1; then
            tail -n 180 /tmp/infra-test.log
            exit 1
          fi
          tail -n 20 /tmp/infra-test.log

      - name: Upload infra test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eventbridge-stop-infra-test-${{ github.run_id }}
          path: /tmp/infra-test.log
          if-no-files-found: warn
          retention-days: 1

      - name: Regenerate infra inventory
        run: npm run docs:infra-inventory

      - name: Type-check API and infra
        run: |
          npm run typecheck -w @memorag-mvp/api
          npm run typecheck -w @memorag-mvp/infra

      - name: Lint repository
        run: npm run lint

      - name: Check generated inventory and diff
        run: |
          npm run docs:infra-inventory:check
          git diff --check

      - name: Commit generated EventBridge stop
        run: |
          rm .github/workflows/cost-first-disable-eventbridge-once.yml
          rm scripts/apply-cost-first-eventbridge-stop.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "💸 fix(infra): cost-firstでEventBridge schedulesを無効化"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
