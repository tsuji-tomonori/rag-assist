          cat > apps/api/src/contract/conversation-history-version-contract.test.ts <<'TS'
          import assert from "node:assert/strict"
          import test from "node:test"
          import {
            normalizeConversationHistoryInput,
            normalizeStoredConversationHistoryItem
          } from "../adapters/conversation-history-store.js"
          import { ConversationHistoryItemSchema } from "../schemas.js"
          import {
            CONVERSATION_HISTORY_LEGACY_SCHEMA_VERSION,
            CONVERSATION_HISTORY_SCHEMA_VERSION
          } from "../types.js"

          const context = {
            schemaVersion: 1 as const,
            sessionId: "conversation-1",
            temporaryEvidence: [{
              temporaryScopeId: "temp-1",
              documentId: "doc-1",
              status: "active" as const,
              expiresAt: "2099-01-01T00:00:00.000Z",
              updatedAt: "2026-07-18T00:00:00.000Z"
            }],
            updatedAt: "2026-07-18T00:00:00.000Z"
          }
          const baseItem = {
            id: "conversation-1",
            title: "会話",
            updatedAt: "2026-07-18T00:00:00.000Z",
            isFavorite: false,
            messages: [{ role: "user" as const, text: "質問", createdAt: "2026-07-18T00:00:00.000Z" }],
            sessionDocumentContext: context
          }

          test("FR-022 API wire contract defaults new items to current v3 and accepts v1/v2/v3", () => {
            assert.equal(ConversationHistoryItemSchema.parse(baseItem).schemaVersion, 3)
            for (const version of [1, 2, 3]) {
              assert.equal(ConversationHistoryItemSchema.parse({ ...baseItem, schemaVersion: version }).schemaVersion, version)
            }
            assert.equal(ConversationHistoryItemSchema.safeParse({ ...baseItem, schemaVersion: 4 }).success, false)
          })

          test("FR-022 persisted read treats missing as v1 and preserves explicit supported versions", () => {
            assert.equal(normalizeStoredConversationHistoryItem(baseItem).schemaVersion, CONVERSATION_HISTORY_LEGACY_SCHEMA_VERSION)
            for (const version of [1, 2, 3] as const) {
              assert.equal(normalizeStoredConversationHistoryItem({ ...baseItem, schemaVersion: version }).schemaVersion, version)
            }
            assert.throws(() => normalizeStoredConversationHistoryItem({ ...baseItem, schemaVersion: 4 }), /Unsupported conversation history schema version: 4/)
          })

          test("FR-022 write-time migration promotes missing/v1/v2/v3 to v3 without losing session context", () => {
            for (const schemaVersion of [undefined, 1, 2, 3] as const) {
              const normalized = normalizeConversationHistoryInput({ ...baseItem, schemaVersion, rollingSummary: "既存要約" })
              assert.equal(normalized.schemaVersion, CONVERSATION_HISTORY_SCHEMA_VERSION)
              assert.equal(normalized.messages[0]?.text, "質問")
              assert.equal(normalized.rollingSummary, "既存要約")
              assert.equal(normalized.sessionDocumentContext?.temporaryEvidence[0]?.temporaryScopeId, "temp-1")
            }
            assert.throws(() => normalizeConversationHistoryInput({ ...baseItem, schemaVersion: 4 as never }), /Unsupported conversation history schema version: 4/)
          })
          TS

          cat > packages/contract/src/schemas/conversation-history-version.test.ts <<'TS'
          import assert from "node:assert/strict"
          import test from "node:test"
          import { ConversationHistoryItemSchema } from "./chat.js"

          const item = {
            id: "conversation-1",
            title: "会話",
            updatedAt: "2026-07-18T00:00:00.000Z",
            messages: [{ role: "user", text: "質問", createdAt: "2026-07-18T00:00:00.000Z" }]
          }

          test("FR-022 shared wire contract uses v3 for new items and accepts v1/v2/v3", () => {
            assert.equal(ConversationHistoryItemSchema.parse(item).schemaVersion, 3)
            assert.equal(ConversationHistoryItemSchema.parse({ ...item, schemaVersion: 1 }).schemaVersion, 1)
            assert.equal(ConversationHistoryItemSchema.parse({ ...item, schemaVersion: 2 }).schemaVersion, 2)
            assert.equal(ConversationHistoryItemSchema.parse({ ...item, schemaVersion: 3 }).schemaVersion, 3)
            assert.equal(ConversationHistoryItemSchema.safeParse({ ...item, schemaVersion: 4 }).success, false)
          })
          TS

          python3 - <<'PY'
          from pathlib import Path

          path = Path("apps/api/src/adapters/local-stores.test.ts")
          text = path.read_text()
          text = text.replace("assert.equal(history[0]?.schemaVersion, 2)", "assert.equal(history[0]?.schemaVersion, 3)")
          text = text.replace('storedHistory("current-v2", 2)', 'storedHistory("legacy-v2", 2),\n      storedHistory("current-v3", 3)')
          text = text.replace('{ "legacy-missing": 1, "legacy-v1": 1, "current-v2": 2 }', '{ "legacy-missing": 1, "legacy-v1": 1, "legacy-v2": 2, "current-v3": 3 }')
          text = text.replace('storedHistory("unknown", 3)', 'storedHistory("unknown", 4)')
          text = text.replace('Unsupported conversation history schema version: 3', 'Unsupported conversation history schema version: 4')
          path.write_text(text)

          path = Path("apps/web/src/App.test.tsx")
          path.write_text(path.read_text().replace("schemaVersion: 2", "schemaVersion: 3"))

          path = Path("apps/web/src/features/history/hooks/useConversationHistory.test.ts")
          path.write_text(path.read_text().replace("schemaVersion: 2", "schemaVersion: 3"))

          path = Path("apps/web/src/features/history/types.ts")
          text = path.read_text().replace("export const CONVERSATION_HISTORY_SCHEMA_VERSION = 2", "export const CONVERSATION_HISTORY_SCHEMA_VERSION = 3")
          text = text.replace("export type ConversationHistorySchemaVersion = 1 | typeof CONVERSATION_HISTORY_SCHEMA_VERSION", "export type ConversationHistorySchemaVersion = 1 | 2 | typeof CONVERSATION_HISTORY_SCHEMA_VERSION")
          path.write_text(text)
          PY

          cat >> 'docs/1_要求_REQ/11_製品要求_PRODUCT/01_機能要求_FUNCTIONAL/05_会話履歴・お気に入り/01_会話履歴管理/REQ_FUNCTIONAL_022.md' <<'MD'

          ## schemaVersion migration契約（v3正本）

          - current write schemaはv3とする。
          - persisted version欠落はlegacy v1として副作用なく読み取る。
          - explicit v1、v2、v3を読み取り対象とし、未知versionはfail closedで拒否する。
          - version欠落、v1、v2、v3の更新保存はv3へ正規化し、messages、summary、citation、task state、tool invocation、`sessionDocumentContext`を保持する。
          - readだけでは保存済みitemをrewriteしない。production一括migrationは別の運用承認対象とする。
          MD

          cat >> 'docs/3_設計_DES/31_データ_DATA/DES_DATA_001.md' <<'MD'

          ## ConversationHistory schema v3 migration

          `ConversationHistoryItem`のcurrent versionは3である。read pathはversion欠落をv1として扱い、v1／v2／v3をそのまま読み取る。write pathはsupported versionを受け入れた後にv3へ正規化する。v3固有の`sessionDocumentContext`は更新保存時にも保持し、read時rewriteは行わない。未知versionはデータ損失を避けるためfail closedとする。
          MD

          cat >> 'docs/3_設計_DES/41_API_API/DES_API_001.md' <<'MD'

          ## Conversation history version boundary

          会話履歴APIの新規・更新responseはschema v3を返す。request／persisted readはv1／v2／v3を受け入れるが、unknown versionは422相当の契約違反またはstore errorとして拒否する。legacy readとcurrent writeを分離し、GET／一覧取得による暗黙migrationは行わない。
          MD

          cat >> 'docs/1_要求_REQ/21_受入基準_ACCEPTANCE/REQ_ACCEPTANCE_001.md' <<'MD'

          ### FR-022 schema v3 migration

          - version欠落、v1、v2、v3の混在itemを読み取れること。
          - unknown versionをfail closedで拒否すること。
          - 新規・更新writeがv3となり、`sessionDocumentContext`を含む既存情報を失わないこと。
          - read前後で永続データが同一であること。
          MD

          cat >> 'docs/1_要求_REQ/11_製品要求_PRODUCT/REQUIREMENTS_BASELINE_202607.md' <<'MD'

          - FR-022の会話履歴current schemaはv3。legacy v1／v2 read、unknown fail-closed、write-time v3 promotion、no-write-on-readを正本契約とする。
          MD

