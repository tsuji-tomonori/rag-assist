name: FR022 v3 apply

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fr022-v3-apply.yml

permissions:
  contents: write

concurrency:
  group: fr022-v3-apply
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply legacy migration contract to v3 main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --quiet origin main codex/fr022-v3-migration
          expected_head="$(git rev-parse origin/codex/fr022-v3-migration)"
          git checkout -B fr022-v3-resolved origin/main
          git cherry-pick 629da86fee793eb9c40c90a0cb500a78b67690c4

          set +e
          git cherry-pick b11f14cbec312463fa6fe7f83b0ae9bcc58e6ab7
          cherry_pick_status=$?
          set -e
          if [ "$cherry_pick_status" -ne 0 ]; then
            git checkout --ours -- \
              'docs/3_設計_DES/31_データ_DATA/DES_DATA_001.md' \
              'docs/3_設計_DES/41_API_API/DES_API_001.md' \
              apps/api/src/adapters/conversation-history-store.ts \
              apps/api/src/adapters/dynamodb-conversation-history-store.test.ts \
              apps/api/src/types.ts

            cat > apps/api/src/adapters/conversation-history-store.ts <<'TS'
          import {
            CONVERSATION_HISTORY_LEGACY_SCHEMA_VERSION,
            CONVERSATION_HISTORY_SCHEMA_VERSION,
            type ConversationHistoryItem,
            type ConversationHistorySchemaVersion,
            type ConversationMessage
          } from "../types.js"

          export type SaveConversationHistoryInput =
            Omit<ConversationHistoryItem, "schemaVersion"> & Partial<Pick<ConversationHistoryItem, "schemaVersion">>

          const CONVERSATION_HISTORY_MESSAGE_LIMIT = 100
          const CONVERSATION_HISTORY_CITATION_MEMORY_LIMIT = 50
          const CONVERSATION_HISTORY_TOOL_INVOCATION_LIMIT = 100
          const CONVERSATION_HISTORY_SUMMARY_MAX_CHARS = 4000
          const SESSION_TEMPORARY_EVIDENCE_LIMIT = 20

          export interface ConversationHistoryStore {
            save(userId: string, input: SaveConversationHistoryInput): Promise<ConversationHistoryItem>
            list(userId: string): Promise<ConversationHistoryItem[]>
            get(userId: string, id: string): Promise<ConversationHistoryItem | undefined>
            delete(userId: string, id: string): Promise<void>
          }

          export function normalizeConversationHistoryInput(input: SaveConversationHistoryInput): ConversationHistoryItem {
            assertSupportedConversationHistorySchemaVersion(input.schemaVersion)
            return {
              ...input,
              schemaVersion: CONVERSATION_HISTORY_SCHEMA_VERSION,
              updatedAt: input.updatedAt || new Date().toISOString(),
              isFavorite: input.isFavorite ?? false,
              messages: trimMessages(input.messages),
              rollingSummary: trimOptional(input.rollingSummary, CONVERSATION_HISTORY_SUMMARY_MAX_CHARS),
              queryFocusedSummary: trimOptional(input.queryFocusedSummary, CONVERSATION_HISTORY_SUMMARY_MAX_CHARS),
              decontextualizedQuery: input.decontextualizedQuery,
              citationMemory: input.citationMemory?.slice(0, CONVERSATION_HISTORY_CITATION_MEMORY_LIMIT),
              taskState: input.taskState,
              toolInvocations: input.toolInvocations?.slice(0, CONVERSATION_HISTORY_TOOL_INVOCATION_LIMIT),
              sessionDocumentContext: normalizeSessionDocumentContext(input.sessionDocumentContext, input.id)
            }
          }

          export function normalizeStoredConversationHistoryItem(
            input: Omit<ConversationHistoryItem, "schemaVersion"> & { schemaVersion?: unknown }
          ): ConversationHistoryItem {
            const schemaVersion = input.schemaVersion ?? CONVERSATION_HISTORY_LEGACY_SCHEMA_VERSION
            assertSupportedConversationHistorySchemaVersion(schemaVersion)
            return { ...input, schemaVersion }
          }

          function assertSupportedConversationHistorySchemaVersion(
            schemaVersion: unknown
          ): asserts schemaVersion is ConversationHistorySchemaVersion | undefined {
            if (
              schemaVersion !== undefined &&
              schemaVersion !== CONVERSATION_HISTORY_LEGACY_SCHEMA_VERSION &&
              schemaVersion !== 2 &&
              schemaVersion !== CONVERSATION_HISTORY_SCHEMA_VERSION
            ) {
              throw new Error(`Unsupported conversation history schema version: ${String(schemaVersion)}`)
            }
          }

          function normalizeSessionDocumentContext(context: ConversationHistoryItem["sessionDocumentContext"], sessionId: string): ConversationHistoryItem["sessionDocumentContext"] {
            if (!context) return undefined
            if (context.sessionId !== sessionId) throw new Error("Session document context must match conversation id")
            const now = Date.now()
            const seen = new Set<string>()
            const temporaryEvidence = context.temporaryEvidence
              .filter((reference) => {
                if (seen.has(reference.temporaryScopeId)) return false
                seen.add(reference.temporaryScopeId)
                return true
              })
              .slice(0, SESSION_TEMPORARY_EVIDENCE_LIMIT)
              .map((reference) => ({
                ...reference,
                status: reference.status === "active" && Date.parse(reference.expiresAt) <= now ? "expired" as const : reference.status
              }))
            return { ...context, schemaVersion: 1, temporaryEvidence }
          }

          function trimMessages(messages: ConversationMessage[]): ConversationMessage[] {
            return messages.slice(0, CONVERSATION_HISTORY_MESSAGE_LIMIT)
          }

          function trimOptional(value: string | undefined, maxChars: number): string | undefined {
            if (value === undefined) return undefined
            return value.slice(0, maxChars)
          }
          TS

            python3 - <<'PY'
          from pathlib import Path
          path = Path("apps/api/src/types.ts")
          text = path.read_text()
          old = '''export const CONVERSATION_HISTORY_SCHEMA_VERSION = 3

          export type ConversationHistorySchemaVersion = 1 | 2 | typeof CONVERSATION_HISTORY_SCHEMA_VERSION
          '''
          new = '''export const CONVERSATION_HISTORY_LEGACY_SCHEMA_VERSION = 1
          export const CONVERSATION_HISTORY_SCHEMA_VERSION = 3

          export type ConversationHistorySchemaVersion =
            | typeof CONVERSATION_HISTORY_LEGACY_SCHEMA_VERSION
            | 2
            | typeof CONVERSATION_HISTORY_SCHEMA_VERSION
          '''
          if old not in text:
              raise SystemExit("conversation history version block not found")
          path.write_text(text.replace(old, new, 1))
          PY

            cat > apps/api/src/adapters/dynamodb-conversation-history-store.test.ts <<'TS'
          import assert from "node:assert/strict"
          import test from "node:test"
          import type { GetItemCommand, QueryCommand } from "@aws-sdk/client-dynamodb"
          import { marshall } from "@aws-sdk/util-dynamodb"
          import { DynamoDbConversationHistoryStore } from "./dynamodb-conversation-history-store.js"

          test("dynamoConversationHistoryStore_listPaginatesUserPartition", async () => {
            const sent: QueryCommand[] = []
            const store = new DynamoDbConversationHistoryStore("ConversationHistoryTable", { send: async (command: QueryCommand) => {
              sent.push(command)
              if (sent.length === 1) {
                return {
                  Items: [marshall(history("conv-1", "2026-05-01T00:00:00.000Z"))],
                  LastEvaluatedKey: marshall({ userId: "user-a", id: "conv-1" })
                }
              }
              return { Items: [marshall(history("conv-2", "2026-05-02T00:00:00.000Z"))] }
            } } as never)

            const histories = await store.list("user-a")
            assert.deepEqual(histories.map((item) => item.id), ["conv-2", "conv-1"])
            assert.equal(sent.length, 2)
            assert.deepEqual(sent[1]?.input.ExclusiveStartKey, marshall({ userId: "user-a", id: "conv-1" }))
          })

          test("conversationHistoryStore_doesNotSliceBeforeFavoriteEnrichment", async () => {
            const store = new DynamoDbConversationHistoryStore("ConversationHistoryTable", { send: async () => ({
              Items: Array.from({ length: 21 }, (_, index) => marshall(history(
                `conv-${index + 1}`,
                `2026-05-${String(index + 1).padStart(2, "0")}T00:00:00.000Z`
              )))
            }) } as never)
            const histories = await store.list("user-a")
            assert.equal(histories.length, 21)
            assert.equal(histories[0]?.id, "conv-21")
            assert.equal(histories.at(-1)?.id, "conv-1")
          })

          test("dynamoConversationHistoryStore_getUsesTenantUserPartitionAndSessionKey", async () => {
            let sent: GetItemCommand | undefined
            const store = new DynamoDbConversationHistoryStore("ConversationHistoryTable", { send: async (command: GetItemCommand) => {
              sent = command
              return { Item: marshall(history("conv-1", "2026-05-01T00:00:00.000Z")) }
            } } as never)
            assert.equal((await store.get("tenant:tenant-a:user:user-a", "conv-1"))?.id, "conv-1")
            assert.deepEqual(sent?.input.Key, marshall({ userId: "tenant:tenant-a:user:user-a", id: "conv-1" }))
            assert.equal(sent?.input.ConsistentRead, true)
          })

          test("FR-022 dynamo store reads missing, v1, v2, and v3 together and rejects unknown versions", async () => {
            const store = new DynamoDbConversationHistoryStore("ConversationHistoryTable", { send: async () => ({
              Items: [
                marshall(history("legacy-missing", "2026-05-01T00:00:00.000Z", undefined)),
                marshall(history("legacy-v1", "2026-05-02T00:00:00.000Z", 1)),
                marshall(history("legacy-v2", "2026-05-03T00:00:00.000Z", 2)),
                marshall(history("current-v3", "2026-05-04T00:00:00.000Z", 3))
              ]
            }) } as never)
            const histories = await store.list("user-a")
            assert.deepEqual(Object.fromEntries(histories.map((item) => [item.id, item.schemaVersion])), {
              "current-v3": 3,
              "legacy-v2": 2,
              "legacy-v1": 1,
              "legacy-missing": 1
            })
            const invalidStore = new DynamoDbConversationHistoryStore("ConversationHistoryTable", { send: async () => ({
              Items: [marshall(history("unknown", "2026-05-05T00:00:00.000Z", 4))]
            }) } as never)
            await assert.rejects(() => invalidStore.list("user-a"), /Unsupported conversation history schema version: 4/)
          })

          function history(id: string, updatedAt: string, schemaVersion: number | undefined = 1) {
            return {
              ...(schemaVersion === undefined ? {} : { schemaVersion }),
              userId: "user-a",
              id,
              title: id,
              messages: [],
              isFavorite: false,
              createdAt: updatedAt,
              updatedAt
            }
          }
          TS

