name: Finalize cost-first API docs and tests once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'codex/cost-first-disable-background-s3-scans' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Regenerate source-backed API docs
        run: npm run docs:api-code -w @memorag-mvp/api

      - name: Run API coverage tests with captured log
        id: api_test
        continue-on-error: true
        run: |
          set +e
          npm run test:coverage -w @memorag-mvp/api > /tmp/api-test.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 120 /tmp/api-test.log
          exit "$status"

      - name: Upload API test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-first-api-test-${{ github.run_id }}
          path: /tmp/api-test.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop when API tests failed
        if: ${{ steps.api_test.outcome != 'success' }}
        run: exit 1

      - name: Validate regenerated docs
        run: |
          npm run docs:api-code:check -w @memorag-mvp/api
          git diff --check

      - name: Commit generated docs and remove helper
        run: |
          rm .github/workflows/cost-first-finalize-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "📝 docs(api): cost-first runtime変更へ生成文書を同期"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
