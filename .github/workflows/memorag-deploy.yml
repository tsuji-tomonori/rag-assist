name: Deploy MemoRAG MVP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment name used for deployment approvals and secrets.
        required: true
        type: choice
        options:
          - dev
        default: dev
      aws-region:
        description: AWS region to deploy into.
        required: true
        default: us-east-1
      bootstrap:
        description: Run cdk bootstrap before deploy. Use only for first-time setup.
        required: true
        type: boolean
        default: false
      default-model-id:
        description: Bedrock model ID used for answer generation.
        required: true
        default: amazon.nova-lite-v1:0
      embedding-model-id:
        description: Bedrock model ID used for embeddings.
        required: true
        default: amazon.titan-embed-text-v2:0
      embedding-dimensions:
        description: Vector index dimension. Must match the embedding model output.
        required: true
        default: "1024"

permissions:
  contents: read
  id-token: write

concurrency:
  group: memorag-deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: CDK deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    timeout-minutes: 45
    env:
      AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      CDK_DEFAULT_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      DEFAULT_MODEL_ID: ${{ inputs.default-model-id || 'amazon.nova-lite-v1:0' }}
      EMBEDDING_MODEL_ID: ${{ inputs.embedding-model-id || 'amazon.titan-embed-text-v2:0' }}
      EMBEDDING_DIMENSIONS: ${{ inputs.embedding-dimensions || '1024' }}
      DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      DEPLOYMENT_MODE: cost_priority
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy inputs
        run: |
          set -euo pipefail
          [[ "$DEFAULT_MODEL_ID" =~ ^[A-Za-z0-9._:/-]+$ ]] || { echo "Invalid default-model-id"; exit 1; }
          [[ "$EMBEDDING_MODEL_ID" =~ ^[A-Za-z0-9._:/-]+$ ]] || { echo "Invalid embedding-model-id"; exit 1; }
          [[ "$EMBEDDING_DIMENSIONS" =~ ^[0-9]{1,5}$ ]] || { echo "Invalid embedding-dimensions"; exit 1; }
          [[ "$DEPLOYMENT_ENVIRONMENT" =~ ^(dev)$ ]] || { echo "Invalid environment"; exit 1; }
          [[ "$DEPLOYMENT_MODE" = "cost_priority" ]] || { echo "Unsupported deployment mode"; exit 1; }

      - name: Prepare cost-priority deployment context
        id: deployment-context
        run: |
          set -euo pipefail
          mkdir -p artifacts/rag-observations artifacts/rag-promotion
          node --import tsx scripts/prepare-rag-promotion-candidate.ts \
            --policy config/rag-quality/dev-policy.json \
            --observations-dir artifacts/rag-observations \
            --output-dir artifacts/rag-promotion

          POLICY_MODEL_ID="$(jq -r '.evidenceVersions.model' artifacts/rag-promotion/policy.json)"
          if [ "$DEFAULT_MODEL_ID" != "$POLICY_MODEL_ID" ]; then
            echo "default-model-id must match the repository policy model: $POLICY_MODEL_ID"
            exit 1
          fi

          echo "RAG_RUNTIME_PROFILE_VERSION=$(jq -r '.runtimeProfileVersion' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_WORKLOAD_PROFILE_VERSION=$(jq -r '.workloadProfileVersion' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PRICE_CATALOG_VERSION=$(jq -r '.priceCatalogVersion' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_INDEX_VERSION=$(jq -r '.evidenceVersions.index' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PROMPT_VERSION=$(jq -r '.evidenceVersions.prompt' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PIPELINE_VERSION=$(jq -r '.evidenceVersions.pipeline' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PARSER_VERSION=$(jq -r '.evidenceVersions.parser' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_CHUNKER_VERSION=$(jq -r '.evidenceVersions.chunker' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"

          jq \
            --arg deploymentMode "$DEPLOYMENT_MODE" \
            --arg commitSha "$GITHUB_SHA" \
            --arg runId "$GITHUB_RUN_ID" \
            '. + {
              deploymentMode: $deploymentMode,
              commitSha: $commitSha,
              runId: $runId,
              promotionGateApplied: false,
              deployAllowed: true,
              sourceObservationScan: false,
              reason: "SQ-015 cost-first profile; FR-075/FR-093 continuous promotion evidence is deferred"
            }' \
            artifacts/rag-promotion/preparation.json \
            > artifacts/rag-promotion/preparation.tmp.json
          mv artifacts/rag-promotion/preparation.tmp.json artifacts/rag-promotion/preparation.json

          echo "deploy-allowed=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Cost-priority deployment context"
            echo
            echo "- mode: $DEPLOYMENT_MODE"
            echo "- policy: $(jq -r '.profileId + "@" + .version' artifacts/rag-promotion/policy.json)"
            echo "- RAG promotion gate applied: false"
            echo "- S3 observation scan: false"
            echo "- deploy allowed: true"
            echo "- reason: monitoring and continuous promotion evidence are deferred by SQ-015"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cost-priority deployment context
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cost-priority-deployment-${{ github.run_id }}
          path: artifacts/rag-promotion/
          if-no-files-found: error

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build deployment artifacts
        if: ${{ success() && steps.deployment-context.outputs.deploy-allowed == 'true' }}
        run: |
          npm run build -w @memorag-mvp/web
          npm run build -w @memorag-mvp/infra

      - name: CDK bootstrap
        if: ${{ success() && steps.deployment-context.outputs.deploy-allowed == 'true' && (inputs.bootstrap || false) }}
        run: >-
          npm run cdk -w @memorag-mvp/infra -- bootstrap
          --context "defaultModelId=$DEFAULT_MODEL_ID"
          --context "embeddingModelId=$EMBEDDING_MODEL_ID"
          --context "embeddingDimensions=$EMBEDDING_DIMENSIONS"
          --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT"
          --context "ragRuntimeProfileVersion=$RAG_RUNTIME_PROFILE_VERSION"
          --context "ragWorkloadProfileVersion=$RAG_WORKLOAD_PROFILE_VERSION"
          --context "ragPriceCatalogVersion=$RAG_PRICE_CATALOG_VERSION"
          --context "ragIndexVersion=$RAG_INDEX_VERSION"
          --context "ragPromptVersion=$RAG_PROMPT_VERSION"
          --context "ragPipelineVersion=$RAG_PIPELINE_VERSION"
          --context "ragParserVersion=$RAG_PARSER_VERSION"
          --context "ragChunkerVersion=$RAG_CHUNKER_VERSION"

      - name: Synthesize CloudFormation YAML
        if: ${{ success() && steps.deployment-context.outputs.deploy-allowed == 'true' }}
        run: |
          mkdir -p infra/cdk.out
          cd infra
          ../node_modules/.bin/cdk synth \
            --context "defaultModelId=$DEFAULT_MODEL_ID" \
            --context "embeddingModelId=$EMBEDDING_MODEL_ID" \
            --context "embeddingDimensions=$EMBEDDING_DIMENSIONS" \
            --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT" \
            --context "ragRuntimeProfileVersion=$RAG_RUNTIME_PROFILE_VERSION" \
            --context "ragWorkloadProfileVersion=$RAG_WORKLOAD_PROFILE_VERSION" \
            --context "ragPriceCatalogVersion=$RAG_PRICE_CATALOG_VERSION" \
            --context "ragIndexVersion=$RAG_INDEX_VERSION" \
            --context "ragPromptVersion=$RAG_PROMPT_VERSION" \
            --context "ragPipelineVersion=$RAG_PIPELINE_VERSION" \
            --context "ragParserVersion=$RAG_PARSER_VERSION" \
            --context "ragChunkerVersion=$RAG_CHUNKER_VERSION" \
            > cdk.out/MemoRagMvpStack.template.yaml

      - name: Upload synth artifacts
        if: ${{ success() && steps.deployment-context.outputs.deploy-allowed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-synth-${{ inputs.environment || 'dev' }}
          path: |
            infra/cdk.out/MemoRagMvpStack.template.yaml
            infra/cdk.out/AwsSolutions-*-NagReport.csv
          if-no-files-found: warn

      - name: CDK deploy
        if: ${{ success() && steps.deployment-context.outputs.deploy-allowed == 'true' }}
        run: >-
          npm run cdk -w @memorag-mvp/infra --
          deploy
          --require-approval never
          --outputs-file cdk-outputs.json
          --context "defaultModelId=$DEFAULT_MODEL_ID"
          --context "embeddingModelId=$EMBEDDING_MODEL_ID"
          --context "embeddingDimensions=$EMBEDDING_DIMENSIONS"
          --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT"
          --context "ragRuntimeProfileVersion=$RAG_RUNTIME_PROFILE_VERSION"
          --context "ragWorkloadProfileVersion=$RAG_WORKLOAD_PROFILE_VERSION"
          --context "ragPriceCatalogVersion=$RAG_PRICE_CATALOG_VERSION"
          --context "ragIndexVersion=$RAG_INDEX_VERSION"
          --context "ragPromptVersion=$RAG_PROMPT_VERSION"
          --context "ragPipelineVersion=$RAG_PIPELINE_VERSION"
          --context "ragParserVersion=$RAG_PARSER_VERSION"
          --context "ragChunkerVersion=$RAG_CHUNKER_VERSION"

      - name: Upload deployment outputs
        if: ${{ success() && steps.deployment-context.outputs.deploy-allowed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-outputs-${{ inputs.environment || 'dev' }}
          path: infra/cdk-outputs.json
          if-no-files-found: error
