name: Deploy MemoRAG MVP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment name used for deployment approvals and secrets.
        required: true
        type: choice
        options:
          - dev
        default: dev
      aws-region:
        description: AWS region to deploy into.
        required: true
        default: us-east-1
      bootstrap:
        description: Run cdk bootstrap before deploy. Use only for first-time setup.
        required: true
        type: boolean
        default: false
      default-model-id:
        description: Bedrock model ID used for answer generation.
        required: true
        default: amazon.nova-lite-v1:0
      embedding-model-id:
        description: Bedrock model ID used for embeddings.
        required: true
        default: amazon.titan-embed-text-v2:0
      embedding-dimensions:
        description: Vector index dimension. Must match the embedding model output.
        required: true
        default: "1024"

permissions:
  contents: read
  id-token: write

concurrency:
  group: memorag-deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: CDK deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    timeout-minutes: 45
    defaults:
      run:
        working-directory: memorag-bedrock-mvp
    env:
      AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      CDK_DEFAULT_REGION: ${{ inputs.aws-region || 'us-east-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: memorag-bedrock-mvp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build deployment artifacts
        run: |
          npm run build -w @memorag-mvp/web
          npm run build -w @memorag-mvp/infra

      - name: CDK bootstrap
        if: ${{ inputs.bootstrap || false }}
        run: >-
          npm run cdk -w @memorag-mvp/infra -- bootstrap
          --context "defaultModelId=${{ inputs.default-model-id || 'amazon.nova-lite-v1:0' }}"
          --context "embeddingModelId=${{ inputs.embedding-model-id || 'amazon.titan-embed-text-v2:0' }}"
          --context "embeddingDimensions=${{ inputs.embedding-dimensions || '1024' }}"
          --context "deploymentEnvironment=${{ inputs.environment || 'dev' }}"

      - name: Synthesize CloudFormation YAML
        run: |
          mkdir -p infra/cdk.out
          cd infra
          ../node_modules/.bin/cdk synth \
            --context "defaultModelId=${{ inputs.default-model-id || 'amazon.nova-lite-v1:0' }}" \
            --context "embeddingModelId=${{ inputs.embedding-model-id || 'amazon.titan-embed-text-v2:0' }}" \
            --context "embeddingDimensions=${{ inputs.embedding-dimensions || '1024' }}" \
            --context "deploymentEnvironment=${{ inputs.environment || 'dev' }}" \
            > cdk.out/MemoRagMvpStack.template.yaml

      - name: Upload synth artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-synth-${{ inputs.environment || 'dev' }}
          path: |
            memorag-bedrock-mvp/infra/cdk.out/MemoRagMvpStack.template.yaml
            memorag-bedrock-mvp/infra/cdk.out/AwsSolutions-*-NagReport.csv
          if-no-files-found: warn

      - name: CDK deploy
        run: >-
          npm run cdk -w @memorag-mvp/infra --
          deploy
          --require-approval never
          --outputs-file cdk-outputs.json
          --context "defaultModelId=${{ inputs.default-model-id || 'amazon.nova-lite-v1:0' }}"
          --context "embeddingModelId=${{ inputs.embedding-model-id || 'amazon.titan-embed-text-v2:0' }}"
          --context "embeddingDimensions=${{ inputs.embedding-dimensions || '1024' }}"
          --context "deploymentEnvironment=${{ inputs.environment || 'dev' }}"

      - name: Upload deployment outputs
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-outputs-${{ inputs.environment || 'dev' }}
          path: memorag-bedrock-mvp/infra/cdk-outputs.json
          if-no-files-found: error
