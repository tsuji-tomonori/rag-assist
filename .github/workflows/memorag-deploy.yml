name: Deploy MemoRAG MVP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment name used for deployment approvals and secrets.
        required: true
        type: choice
        options:
          - dev
        default: dev
      aws-region:
        description: AWS region to deploy into.
        required: true
        default: us-east-1
      bootstrap:
        description: Run cdk bootstrap before deploy. Use only for first-time setup.
        required: true
        type: boolean
        default: false
      default-model-id:
        description: Bedrock model ID used for answer generation.
        required: true
        default: amazon.nova-lite-v1:0
      embedding-model-id:
        description: Bedrock model ID used for embeddings.
        required: true
        default: amazon.titan-embed-text-v2:0
      embedding-dimensions:
        description: Vector index dimension. Must match the embedding model output.
        required: true
        default: "1024"
      rag-quality-policy-s3-uri:
        description: S3 URI of the versioned stakeholder-approved RAG quality policy JSON.
        required: false
        default: ""
      rag-quality-observations-s3-uri:
        description: S3 URI of the versioned candidate observations JSON including release-audit evidence.
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: memorag-deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: CDK deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    timeout-minutes: 45
    env:
      AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      CDK_DEFAULT_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      DEFAULT_MODEL_ID: ${{ inputs.default-model-id || 'amazon.nova-lite-v1:0' }}
      EMBEDDING_MODEL_ID: ${{ inputs.embedding-model-id || 'amazon.titan-embed-text-v2:0' }}
      EMBEDDING_DIMENSIONS: ${{ inputs.embedding-dimensions || '1024' }}
      DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      RAG_QUALITY_POLICY_S3_URI: ${{ inputs.rag-quality-policy-s3-uri || vars.RAG_QUALITY_POLICY_S3_URI }}
      RAG_QUALITY_OBSERVATIONS_S3_URI: ${{ inputs.rag-quality-observations-s3-uri || vars.RAG_QUALITY_OBSERVATIONS_S3_URI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci


      - name: Validate deploy inputs
        run: |
          set -euo pipefail
          [[ "$DEFAULT_MODEL_ID" =~ ^[A-Za-z0-9._:/-]+$ ]] || { echo "Invalid default-model-id"; exit 1; }
          [[ "$EMBEDDING_MODEL_ID" =~ ^[A-Za-z0-9._:/-]+$ ]] || { echo "Invalid embedding-model-id"; exit 1; }
          [[ "$EMBEDDING_DIMENSIONS" =~ ^[0-9]{1,5}$ ]] || { echo "Invalid embedding-dimensions"; exit 1; }
          [[ "$DEPLOYMENT_ENVIRONMENT" =~ ^(dev)$ ]] || { echo "Invalid environment"; exit 1; }
          [ -n "$RAG_QUALITY_POLICY_S3_URI" ] || { echo "RAG_QUALITY_POLICY_S3_URI is required; deployment is fail-closed without an approved policy artifact"; exit 1; }
          [ -n "$RAG_QUALITY_OBSERVATIONS_S3_URI" ] || { echo "RAG_QUALITY_OBSERVATIONS_S3_URI is required; deployment is fail-closed without candidate observations"; exit 1; }
          [[ "$RAG_QUALITY_POLICY_S3_URI" =~ ^s3://[A-Za-z0-9._-]+/.+\.json$ ]] || { echo "Invalid RAG quality policy S3 URI"; exit 1; }
          [[ "$RAG_QUALITY_OBSERVATIONS_S3_URI" =~ ^s3://[A-Za-z0-9._-]+/.+\.json$ ]] || { echo "Invalid RAG quality observations S3 URI"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download explicit RAG promotion evidence
        run: |
          mkdir -p artifacts/rag-promotion
          aws s3 cp "$RAG_QUALITY_POLICY_S3_URI" artifacts/rag-promotion/policy.json
          aws s3 cp "$RAG_QUALITY_OBSERVATIONS_S3_URI" artifacts/rag-promotion/observations.json

      - name: Enforce RAG promotion gate before deployment
        run: >-
          npm run rag:promotion:check --
          --policy artifacts/rag-promotion/policy.json
          --observations artifacts/rag-promotion/observations.json
          --output artifacts/rag-promotion/decision.json

      - name: Upload RAG promotion evidence and decision
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: memorag-rag-promotion-${{ github.run_id }}
          path: artifacts/rag-promotion/
          if-no-files-found: error

      - name: Build deployment artifacts
        run: |
          npm run build -w @memorag-mvp/web
          npm run build -w @memorag-mvp/infra

      - name: CDK bootstrap
        if: ${{ inputs.bootstrap || false }}
        run: >-
          npm run cdk -w @memorag-mvp/infra -- bootstrap
          --context "defaultModelId=$DEFAULT_MODEL_ID"
          --context "embeddingModelId=$EMBEDDING_MODEL_ID"
          --context "embeddingDimensions=$EMBEDDING_DIMENSIONS"
          --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT"

      - name: Synthesize CloudFormation YAML
        run: |
          mkdir -p infra/cdk.out
          cd infra
          ../node_modules/.bin/cdk synth \
            --context "defaultModelId=$DEFAULT_MODEL_ID" \
            --context "embeddingModelId=$EMBEDDING_MODEL_ID" \
            --context "embeddingDimensions=$EMBEDDING_DIMENSIONS" \
            --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT" \
            > cdk.out/MemoRagMvpStack.template.yaml

      - name: Upload synth artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-synth-${{ inputs.environment || 'dev' }}
          path: |
            infra/cdk.out/MemoRagMvpStack.template.yaml
            infra/cdk.out/AwsSolutions-*-NagReport.csv
          if-no-files-found: warn

      - name: CDK deploy
        run: >-
          npm run cdk -w @memorag-mvp/infra --
          deploy
          --require-approval never
          --outputs-file cdk-outputs.json
          --context "defaultModelId=$DEFAULT_MODEL_ID"
          --context "embeddingModelId=$EMBEDDING_MODEL_ID"
          --context "embeddingDimensions=$EMBEDDING_DIMENSIONS"
          --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT"

      - name: Upload deployment outputs
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-outputs-${{ inputs.environment || 'dev' }}
          path: infra/cdk-outputs.json
          if-no-files-found: error
