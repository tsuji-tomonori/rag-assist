name: Deploy MemoRAG MVP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment name used for deployment approvals and secrets.
        required: true
        type: choice
        options:
          - dev
        default: dev
      aws-region:
        description: AWS region to deploy into.
        required: true
        default: us-east-1
      bootstrap:
        description: Run cdk bootstrap before deploy. Use only for first-time setup.
        required: true
        type: boolean
        default: false
      policy-bootstrap:
        description: Allow the approved dev policy's first deploy without complete observations.
        required: true
        type: boolean
        default: false
      policy-bootstrap-authorization:
        description: Exact <main SHA>:<policy profile>@<policy version> authorization for policy bootstrap.
        required: false
        default: ""
      default-model-id:
        description: Bedrock model ID used for answer generation.
        required: true
        default: amazon.nova-lite-v1:0
      embedding-model-id:
        description: Bedrock model ID used for embeddings.
        required: true
        default: amazon.titan-embed-text-v2:0
      embedding-dimensions:
        description: Vector index dimension. Must match the embedding model output.
        required: true
        default: "1024"

permissions:
  contents: read
  id-token: write

concurrency:
  group: memorag-deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: CDK deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    timeout-minutes: 45
    env:
      AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      CDK_DEFAULT_REGION: ${{ inputs.aws-region || 'us-east-1' }}
      DEFAULT_MODEL_ID: ${{ inputs.default-model-id || 'amazon.nova-lite-v1:0' }}
      EMBEDDING_MODEL_ID: ${{ inputs.embedding-model-id || 'amazon.titan-embed-text-v2:0' }}
      EMBEDDING_DIMENSIONS: ${{ inputs.embedding-dimensions || '1024' }}
      DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      POLICY_BOOTSTRAP: ${{ inputs.policy-bootstrap || false }}
      POLICY_BOOTSTRAP_AUTHORIZATION: ${{ inputs.policy-bootstrap-authorization || '' }}
      POLICY_BOOTSTRAP_APPROVED_IDENTITY: memorag-dev-rag-quality@2026-07-16.draft-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci


      - name: Validate deploy inputs
        run: |
          set -euo pipefail
          [[ "$DEFAULT_MODEL_ID" =~ ^[A-Za-z0-9._:/-]+$ ]] || { echo "Invalid default-model-id"; exit 1; }
          [[ "$EMBEDDING_MODEL_ID" =~ ^[A-Za-z0-9._:/-]+$ ]] || { echo "Invalid embedding-model-id"; exit 1; }
          [[ "$EMBEDDING_DIMENSIONS" =~ ^[0-9]{1,5}$ ]] || { echo "Invalid embedding-dimensions"; exit 1; }
          [[ "$DEPLOYMENT_ENVIRONMENT" =~ ^(dev)$ ]] || { echo "Invalid environment"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve the documents bucket
        run: |
          set -euo pipefail
          DOCUMENTS_BUCKET_NAME="$(aws cloudformation describe-stacks --stack-name MemoRagMvpStack --query "Stacks[0].Outputs[?OutputKey=='DocumentsBucketName'].OutputValue | [0]" --output text)"
          if [ -z "$DOCUMENTS_BUCKET_NAME" ] || [ "$DOCUMENTS_BUCKET_NAME" = "None" ]; then
            echo "MemoRagMvpStack.DocumentsBucketName is unavailable; an existing dev stack is required."
            exit 1
          fi
          echo "DOCUMENTS_BUCKET_NAME=$DOCUMENTS_BUCKET_NAME" >> "$GITHUB_ENV"

      - name: Download RAG quality observations
        run: |
          set -euo pipefail
          mkdir -p artifacts/rag-observations
          aws s3 sync "s3://$DOCUMENTS_BUCKET_NAME/quality-control/observations/" artifacts/rag-observations/ --exclude "*" --include "*.json"

      - name: Prepare and upload RAG promotion candidate
        id: promotion-candidate
        run: |
          set -euo pipefail
          node --import tsx scripts/prepare-rag-promotion-candidate.ts --policy config/rag-quality/dev-policy.json --observations-dir artifacts/rag-observations --output-dir artifacts/rag-promotion

          POLICY_MODEL_ID="$(jq -r '.evidenceVersions.model' artifacts/rag-promotion/policy.json)"
          if [ "$DEFAULT_MODEL_ID" != "$POLICY_MODEL_ID" ]; then
            echo "default-model-id must match the approved policy model: $POLICY_MODEL_ID"
            exit 1
          fi
          POLICY_ID="$(jq -r '.policyId' artifacts/rag-promotion/preparation.json)"
          POLICY_VERSION="$(jq -r '.policyVersion' artifacts/rag-promotion/preparation.json)"
          READY="$(jq -r '.ready' artifacts/rag-promotion/preparation.json)"
          BOOTSTRAP_AUTHORIZED=false
          DEPLOY_ALLOWED="$READY"

          if [ "$POLICY_BOOTSTRAP" = "true" ]; then
            EXPECTED_BOOTSTRAP_AUTHORIZATION="$GITHUB_SHA:$POLICY_ID@$POLICY_VERSION"
            if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] || [ "$DEPLOYMENT_ENVIRONMENT" != "dev" ]; then
              echo "policy bootstrap is restricted to a manual dev workflow dispatch"
              exit 1
            fi
            if [ "$POLICY_ID@$POLICY_VERSION" != "$POLICY_BOOTSTRAP_APPROVED_IDENTITY" ]; then
              echo "policy bootstrap is restricted to $POLICY_BOOTSTRAP_APPROVED_IDENTITY"
              exit 1
            fi
            if [ "$POLICY_BOOTSTRAP_AUTHORIZATION" != "$EXPECTED_BOOTSTRAP_AUTHORIZATION" ]; then
              echo "policy-bootstrap-authorization must exactly match the checked-out main SHA and approved policy identity"
              exit 1
            fi
            RAG_POLICY_BOOTSTRAP_MARKER_KEY="quality-control/bootstrap-authorizations/$POLICY_ID/$POLICY_VERSION.json"
            if aws s3api head-object --bucket "$DOCUMENTS_BUCKET_NAME" --key "$RAG_POLICY_BOOTSTRAP_MARKER_KEY" >/dev/null 2>&1; then
              echo "policy bootstrap has already completed for $POLICY_ID@$POLICY_VERSION"
              exit 1
            fi
            echo "RAG_POLICY_BOOTSTRAP_MARKER_S3_URI=s3://$DOCUMENTS_BUCKET_NAME/$RAG_POLICY_BOOTSTRAP_MARKER_KEY" >> "$GITHUB_ENV"
            BOOTSTRAP_AUTHORIZED=true
            DEPLOY_ALLOWED=true
          fi

          POLICY_PREFIX="quality-control/promotion-candidates/$POLICY_VERSION/$GITHUB_SHA/$GITHUB_RUN_ID"
          RAG_QUALITY_POLICY_S3_URI="s3://$DOCUMENTS_BUCKET_NAME/$POLICY_PREFIX/policy.json"
          RAG_QUALITY_OBSERVATIONS_S3_URI="s3://$DOCUMENTS_BUCKET_NAME/$POLICY_PREFIX/observations.json"

          aws s3 cp artifacts/rag-promotion/policy.json "$RAG_QUALITY_POLICY_S3_URI"
          aws s3 cp artifacts/rag-promotion/policy.json "s3://$DOCUMENTS_BUCKET_NAME/quality-control/policies/active.json"
          aws s3 cp artifacts/rag-promotion/observations.json "$RAG_QUALITY_OBSERVATIONS_S3_URI"
          aws s3 cp artifacts/rag-promotion/preparation.json "s3://$DOCUMENTS_BUCKET_NAME/$POLICY_PREFIX/preparation.json"

          echo "RAG_QUALITY_POLICY_S3_URI=$RAG_QUALITY_POLICY_S3_URI" >> "$GITHUB_ENV"
          echo "RAG_QUALITY_OBSERVATIONS_S3_URI=$RAG_QUALITY_OBSERVATIONS_S3_URI" >> "$GITHUB_ENV"
          echo "RAG_RUNTIME_PROFILE_VERSION=$(jq -r '.runtimeProfileVersion' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_WORKLOAD_PROFILE_VERSION=$(jq -r '.workloadProfileVersion' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PRICE_CATALOG_VERSION=$(jq -r '.priceCatalogVersion' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_INDEX_VERSION=$(jq -r '.evidenceVersions.index' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PROMPT_VERSION=$(jq -r '.evidenceVersions.prompt' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PIPELINE_VERSION=$(jq -r '.evidenceVersions.pipeline' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_PARSER_VERSION=$(jq -r '.evidenceVersions.parser' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"
          echo "RAG_CHUNKER_VERSION=$(jq -r '.evidenceVersions.chunker' artifacts/rag-promotion/policy.json)" >> "$GITHUB_ENV"

          echo "ready=$READY" >> "$GITHUB_OUTPUT"
          echo "bootstrap-authorized=$BOOTSTRAP_AUTHORIZED" >> "$GITHUB_OUTPUT"
          echo "deploy-allowed=$DEPLOY_ALLOWED" >> "$GITHUB_OUTPUT"
          {
            echo "## RAG promotion candidate"
            echo
            echo "- policy: $(jq -r '.policyId + "@" + .policyVersion' artifacts/rag-promotion/preparation.json)"
            echo "- policy URI: $RAG_QUALITY_POLICY_S3_URI"
            echo "- observations URI: $RAG_QUALITY_OBSERVATIONS_S3_URI"
            echo "- matched observations: $(jq -r '.matchedObservationCount' artifacts/rag-promotion/preparation.json)"
            echo "- deploy ready: $READY"
            echo "- policy bootstrap authorized: $BOOTSTRAP_AUTHORIZED"
            if [ "$READY" != "true" ]; then
              if [ "$BOOTSTRAP_AUTHORIZED" = "true" ]; then
                echo "- result: required evidence is incomplete; the explicitly authorized dev bootstrap deploy will continue without synthesizing evidence."
              else
                echo "- result: required evidence is incomplete; deploy is deferred without synthesizing values."
              fi
              echo "- missing observations: $(jq -r '.missingObservations | length' artifacts/rag-promotion/preparation.json)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce RAG promotion gate before deployment
        if: ${{ steps.promotion-candidate.outputs.ready == 'true' }}
        run: >-
          npm run rag:promotion:check --
          --policy artifacts/rag-promotion/policy.json
          --observations artifacts/rag-promotion/observations.json
          --output artifacts/rag-promotion/decision.json

      - name: Upload RAG promotion evidence and decision
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: memorag-rag-promotion-${{ github.run_id }}
          path: artifacts/rag-promotion/
          if-no-files-found: error

      - name: Build deployment artifacts
        if: ${{ success() && steps.promotion-candidate.outputs.deploy-allowed == 'true' }}
        run: |
          npm run build -w @memorag-mvp/web
          npm run build -w @memorag-mvp/infra

      - name: CDK bootstrap
        if: ${{ success() && steps.promotion-candidate.outputs.deploy-allowed == 'true' && (inputs.bootstrap || false) }}
        run: >-
          npm run cdk -w @memorag-mvp/infra -- bootstrap
          --context "defaultModelId=$DEFAULT_MODEL_ID"
          --context "embeddingModelId=$EMBEDDING_MODEL_ID"
          --context "embeddingDimensions=$EMBEDDING_DIMENSIONS"
          --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT"
          --context "ragRuntimeProfileVersion=$RAG_RUNTIME_PROFILE_VERSION"
          --context "ragWorkloadProfileVersion=$RAG_WORKLOAD_PROFILE_VERSION"
          --context "ragPriceCatalogVersion=$RAG_PRICE_CATALOG_VERSION"
          --context "ragIndexVersion=$RAG_INDEX_VERSION"
          --context "ragPromptVersion=$RAG_PROMPT_VERSION"
          --context "ragPipelineVersion=$RAG_PIPELINE_VERSION"
          --context "ragParserVersion=$RAG_PARSER_VERSION"
          --context "ragChunkerVersion=$RAG_CHUNKER_VERSION"

      - name: Synthesize CloudFormation YAML
        if: ${{ success() && steps.promotion-candidate.outputs.deploy-allowed == 'true' }}
        run: |
          mkdir -p infra/cdk.out
          cd infra
          ../node_modules/.bin/cdk synth \
            --context "defaultModelId=$DEFAULT_MODEL_ID" \
            --context "embeddingModelId=$EMBEDDING_MODEL_ID" \
            --context "embeddingDimensions=$EMBEDDING_DIMENSIONS" \
            --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT" \
            --context "ragRuntimeProfileVersion=$RAG_RUNTIME_PROFILE_VERSION" \
            --context "ragWorkloadProfileVersion=$RAG_WORKLOAD_PROFILE_VERSION" \
            --context "ragPriceCatalogVersion=$RAG_PRICE_CATALOG_VERSION" \
            --context "ragIndexVersion=$RAG_INDEX_VERSION" \
            --context "ragPromptVersion=$RAG_PROMPT_VERSION" \
            --context "ragPipelineVersion=$RAG_PIPELINE_VERSION" \
            --context "ragParserVersion=$RAG_PARSER_VERSION" \
            --context "ragChunkerVersion=$RAG_CHUNKER_VERSION" \
            > cdk.out/MemoRagMvpStack.template.yaml

      - name: Upload synth artifacts
        if: ${{ success() && steps.promotion-candidate.outputs.deploy-allowed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-synth-${{ inputs.environment || 'dev' }}
          path: |
            infra/cdk.out/MemoRagMvpStack.template.yaml
            infra/cdk.out/AwsSolutions-*-NagReport.csv
          if-no-files-found: warn

      - name: CDK deploy
        if: ${{ success() && steps.promotion-candidate.outputs.deploy-allowed == 'true' }}
        run: >-
          npm run cdk -w @memorag-mvp/infra --
          deploy
          --require-approval never
          --outputs-file cdk-outputs.json
          --context "defaultModelId=$DEFAULT_MODEL_ID"
          --context "embeddingModelId=$EMBEDDING_MODEL_ID"
          --context "embeddingDimensions=$EMBEDDING_DIMENSIONS"
          --context "deploymentEnvironment=$DEPLOYMENT_ENVIRONMENT"
          --context "ragRuntimeProfileVersion=$RAG_RUNTIME_PROFILE_VERSION"
          --context "ragWorkloadProfileVersion=$RAG_WORKLOAD_PROFILE_VERSION"
          --context "ragPriceCatalogVersion=$RAG_PRICE_CATALOG_VERSION"
          --context "ragIndexVersion=$RAG_INDEX_VERSION"
          --context "ragPromptVersion=$RAG_PROMPT_VERSION"
          --context "ragPipelineVersion=$RAG_PIPELINE_VERSION"
          --context "ragParserVersion=$RAG_PARSER_VERSION"
          --context "ragChunkerVersion=$RAG_CHUNKER_VERSION"

      - name: Record completed RAG policy bootstrap
        if: ${{ success() && steps.promotion-candidate.outputs.bootstrap-authorized == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/rag-bootstrap
          jq -n \
            --arg completedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commitSha "$GITHUB_SHA" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg policyUri "$RAG_QUALITY_POLICY_S3_URI" \
            --arg observationsUri "$RAG_QUALITY_OBSERVATIONS_S3_URI" \
            '{schemaVersion: 1, completedAt: $completedAt, commitSha: $commitSha, runId: $runId, policyUri: $policyUri, observationsUri: $observationsUri}' \
            > artifacts/rag-bootstrap/bootstrap-completion.json
          aws s3 cp artifacts/rag-bootstrap/bootstrap-completion.json "$RAG_POLICY_BOOTSTRAP_MARKER_S3_URI"

      - name: Upload deployment outputs
        if: ${{ success() && steps.promotion-candidate.outputs.deploy-allowed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: memorag-cdk-outputs-${{ inputs.environment || 'dev' }}
          path: |
            infra/cdk-outputs.json
            artifacts/rag-bootstrap/bootstrap-completion.json
          if-no-files-found: error
