version: '3'

tasks:
  precommit:
    desc: Install pre-commit hook
    cmds:
      - pre-commit install

  memorag:install:
    desc: Install MemoRAG MVP npm workspace dependencies
    dir: memorag-bedrock-mvp
    cmds:
      - npm install

  memorag:verify:
    desc: Type-check and build the MemoRAG MVP
    dir: memorag-bedrock-mvp
    cmds:
      - task verify

  memorag:dev:api:
    desc: Run the MemoRAG API locally
    dir: memorag-bedrock-mvp
    cmds:
      - task dev:api

  memorag:dev:web:
    desc: Run the MemoRAG web UI locally
    dir: memorag-bedrock-mvp
    cmds:
      - task dev:web

  memorag:smoke:api:
    desc: Smoke-test a running MemoRAG API
    dir: memorag-bedrock-mvp
    cmds:
      - task smoke:api

  memorag:cdk:test:
    desc: Run MemoRAG CDK assertion and snapshot tests
    dir: memorag-bedrock-mvp
    cmds:
      - task cdk:test

  memorag:cdk:synth:yaml:
    desc: Synthesize MemoRAG CDK stack and write YAML output
    dir: memorag-bedrock-mvp
    cmds:
      - task cdk:synth:yaml

  memorag:cdk:bootstrap:
    desc: Bootstrap the MemoRAG target AWS account and region
    dir: memorag-bedrock-mvp
    cmds:
      - task cdk:bootstrap

  memorag:cdk:deploy:ci:
    desc: Build, test, and deploy the MemoRAG CDK stack without approval prompts
    dir: memorag-bedrock-mvp
    cmds:
      - task cdk:deploy:ci

  memorag:zip:
    desc: Create the MemoRAG MVP zip archive
    dir: memorag-bedrock-mvp
    cmds:
      - task zip ZIP_OUT=../.workspace/memorag-bedrock-mvp.zip
